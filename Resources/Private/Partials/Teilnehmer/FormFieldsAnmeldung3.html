<div class="frame"><h2><f:translate key="beruflichesituation" /></h2>
		<div class="tp13_formdivwebapp1">
			<label for="erwerbsstatus" class="tp13_options">{settings.ztesz}
				<f:translate key="tx_iqtp13db_domain_model_teilnehmer.erwerbsstatus" /></span>
			</label>
				<div class="tp13_formdivwebappmultiradio">
				<f:for each="{settings.erwerbsstatus}" as="text" key="wert">
					<f:form.radio property="erwerbsstatus" value="{wert}" checked="{tnseite3.erwerbsstatus} == {wert}" /><span class="abschlussradiotext">{text}</span><br />
				</f:for>
				</div>
				<div style="clear: both;"></div>
		</div>
		<div class="tp13_formdivwebapp2">
			<label for="leistungsbezug" class="tp13_options">
				<span id="infolab" title="<f:translate key='infoBezugsart' />" class="infolabel"><f:translate key="tx_iqtp13db_domain_model_teilnehmer.leistungsbezug" />
			</label>
				<div class="tp13_formdivwebappmultiradio">
				<f:for each="{settings.leistungsbezug}" as="text" key="wert">
					<f:form.radio property="leistungsbezug" value="{wert}" checked="{tnseite3.leistungsbezug} == {wert}" /><span class="abschlussradiotext">{text}</span><br />
				</f:for>
				</div>
				<div style="clear: both;"></div>
		</div>
</div>
<div style="clear: both;"></div>
